<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Pride Platinum Library</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the path and redirects to root, where the SPA router picks it up
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
